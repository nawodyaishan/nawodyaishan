name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate language stats
        uses: StefVuck/github-profile-language-analytics@v1
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          visualization_types: "bar"
          output_path: "github-stats"
          exclude_languages: "HTML,CSS,HLSL,ShaderLab,SCSS,TeX,Dart,R,C,Swift,Solidity,Jupyter Notebook"
          include_forks: "false"
          dark_mode: "true"
